<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slack | AI Work Platform & Productivity Tools</title>
    <link rel="shortcut icon" href="./images/logo.svg" type="image/x-icon">
    <link rel="stylesheet" href="./css/base.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="">
        <nav class="flex max-w-7xl mx-auto items-center justify-between py-5 px-4">
            <div class="left flex gap-12">
                <img src="./images/Logo.png" class="w-[115px]" alt="">

                <ul class="flex gap-12 items-center font-bold text-md">
                    <li class="hover:text-[#611f69]">Features <i class="ri-arrow-down-s-line"></i></li>
                    <li class="hover:text-[#611f69] cursor-pointer">Solutions <i class="ri-arrow-down-s-line"></i></li>
                    <li class="hover:text-[#611f69] cursor-pointer">Enterprise</li>
                    <li class="hover:text-[#611f69] cursor-pointer">Resources <i class="ri-arrow-down-s-line"></i></li>
                    <li class="hover:text-[#611f69] cursor-pointer">Pricing</li>
                </ul>
            </div>
            <div class="flex gap-2 font-bold text-lg ">
                <button class="hover:underline cursor-pointer">Sign in</button>
                <button class="bg-[#611f69] cursor-pointer text-white rouded px-4 py-2 hover:bg-[#4a154b]">GET
                    STARTED</button>
                    <div class="hidden md:flex rounded bg-purple-300 p-4 "></div>
            </div>
        </nav>
    </header>
    <main>
        <section class="flex flex-col items-center w-full py-19 text-black gap-8">
            <div class="hero-text text-5xl pt-6 font-semibold leading-tight tracking-tight">
                <h1>Slack is your team's collective 🧠 brain.</h1>
            </div>
            <div class="text-xl">
                <p class="text-gray-700">Move faster and work smarter with <br>
                    people, apps, and AI at your side.
                </p>
            </div>
            <div class="cta-btns flex text-xl gap-6 font-semibold">
                <button class="bg-[#611f69] cursor-pointer text-white rouded px-6 py-3 hover:bg-[#4a154b]">GET STARTED</button>
                <button class="border px-6 py-3 border-[#611f69] hover:border-2 ease">FIND YOUR PLAN <i class="ri-arrow-right-line align-middle"></i></button>
            </div>
            <div class="flex justify-evenly w-full grayscale py-10 mt-20">
                <p class="text-gray-700">Trusted by top teams</p>
                <img src="./images/gm.png" alt="GM" class="h-7 object-contain">
                <img src="./images/openai.png" alt="" class="h-7 object-contain">
                <img src="./images/target.png" alt="" class="h-7 object-contain">
                <img src="./images/paramount.png" alt="" class="h-7 object-contain">
                <img src="./images/ibm.png" alt="" class="h-7 object-contain">
                <img src="./images/stripe.png" alt="" class="h-7 object-contain">
            </div>
        </section>
    </main>
    <footer></footer>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</body>

</html>
